<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dairly — Milk Delivery Platform</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Top Role Switcher -->
  <header class="platform-header">
    <div class="brand">
      <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2h8v4l3 6c1 2 1 4 1 6v10a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2V18c0-2 0-4 1-6l3-6V2z"/>
        <path d="M11 14h10"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">Dairly</span>
        <span class="brand-tagline">Fresh Milk, Every Morning</span>
      </div>
    </div>
    <nav class="role-switcher" aria-label="App role switcher">
      <button class="role-btn active" data-role="customer">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
        <span>Customer</span>
      </button>
      <button class="role-btn" data-role="vendor">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10l9-7 9 7v10a2 2 0 0 1-2 2h-4v-6h-6v6H5a2 2 0 0 1-2-2V10z"/></svg>
        <span>Vendor</span>
      </button>
      <button class="role-btn" data-role="admin">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
        <span>Admin</span>
      </button>
    </nav>
  </header>

  <!-- Stage -->
  <main class="stage" id="stage">
    <!-- Apps injected here -->
  </main>

  <script src="app.js"></script>
</body>
</html>
